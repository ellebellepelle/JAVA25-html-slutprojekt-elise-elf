<main>
    <h1>Skicka ett meddelande till mig.</h1>

    <div class="alert alert-info mt-4" role="alert">
    </div>

    <p>Ställ en fråga, berätta vad du ska göra idag eller be om ett gott råd i livet. 🙆🏼‍♀️</p>


    <!-- formulär 1, ja/nej-fråga (textinput + obligatoriskt fält) -->
    <form id="formFraga">
        <!-- label kopplad till input via for + id (viktigt för tillgänglighet) -->
        <label for="fraga">
            Fråga på. Men jag kan bara besvara ja eller nej frågor
        </label>
        <!-- reqired gör att användaren måste fylla i innan formuläret skickas -->
        <input required type="text" id="fraga" name="fraga">
        <!-- submit-knapp -->
        <button type="submit" class="btn btn-primary">Skicka</button>  <!-- bootstrap -->
        <!-- här visas svaret via JavaScript -->
        <p id="svarFraga" class="form-svar"></p>
    </form>

    <!-- formulär 2 -->
    <form id="formFragaTva">
        <label for="fragaTva">
            Berätta, vad ska du göra / har du gjort idag? 🤓
        </label>
        <input type="text" id="fragaTva" name="fragaTva">
        <button type="submit" class="btn btn-primary">Skicka</button>
        <p id="svarFragaTva" class="form-svar"></p>
    </form>

    <!-- formulär 3 (select-dropdown)-->
    <form id="formFragaTre">
        <label for="fragaTre">
            Vill du ha ett gott råd i livet?
        </label>
        <!-- dropdown-meny -->
        <select id="fragaTre" name="fragaTre">
            <option value="ja">Ja tack, gärna ❤️</option>
            <option value="nej">Nej nej, jag klarar mig utan 😈</option>
        </select>
        <button type="submit" class="btn btn-primary">Skicka</button>
        <p id="svarFragaTre" class="form-svar"></p>
    </form>

    <!-- formulär 4, datum + färgval -->
    <form id="formExtra">
        <!-- datumväljare -->
        <label for="date">
            Vilket datum är det idag?
        </label>
        <input type="date" id="date" name="date">

        <!-- färgväljare -->
        <label for="color">
            Min favoritfärg är rosa, vilken är din?
        </label>
        <input type="color" id="color" name="color">
        <button type="submit" class="btn btn-primary">Skicka</button>
    </form>

    <div class="alert alert-info mt-4" role="alert">
    </div>





</main>
